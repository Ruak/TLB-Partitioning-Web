<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VexRiscv TLB Partitioning FPGA Console</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">TLB</div>
          <div>
            <strong>VexRiscv</strong>
            <span>FPGA Console</span>
          </div>
        </div>
        <nav class="nav">
          <button class="nav-item active" data-view="protected">有防护模式</button>
          <button class="nav-item" data-view="records">运行记录</button>
          <button class="nav-item disabled" disabled>无防护模式</button>
        </nav>
        <div class="side-status">
          <span>SSH</span>
          <strong id="sideSshStatus">未连接</strong>
        </div>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div>
            <span class="eyebrow">真实链路</span>
            <h1>FPGA SSH 与 test.c 运行控制台</h1>
          </div>
          <div class="status-strip">
            <span class="status-pill" id="backendStatus">后端检查中</span>
            <span class="status-pill offline" id="sshStatus">SSH 未连接</span>
            <span class="status-pill idle" id="resultStatus">结果待采集</span>
          </div>
        </header>

        <section class="view active" id="protected">
          <div class="layout">
            <section class="panel connection-panel">
              <div class="panel-head">
                <div>
                  <span class="eyebrow">目标板卡</span>
                  <h2>SSH 连接</h2>
                </div>
              </div>
              <label>
                FPGA Target
                <select id="targetSelect"></select>
              </label>
              <dl class="target-meta" id="targetMeta">
                <div><dt>Host</dt><dd>--</dd></div>
                <div><dt>User</dt><dd>--</dd></div>
                <div><dt>Workdir</dt><dd>--</dd></div>
              </dl>
              <div class="button-row">
                <button class="btn primary" id="connectBtn">连接</button>
                <button class="btn ghost" id="disconnectBtn">断开</button>
              </div>
            </section>

            <section class="panel command-panel">
              <div class="panel-head">
                <div>
                  <span class="eyebrow">白名单命令</span>
                  <h2>test_with 执行</h2>
                </div>
              </div>
              <div class="command-list">
                <button class="command-item" data-command="runTestC">
                  <strong>运行 test_with</strong>
                  <span id="cmdRun">--</span>
                </button>
                <button class="command-item" data-command="collectResult">
                  <strong>查看可执行文件</strong>
                  <span id="cmdCollect">--</span>
                </button>
                <button class="command-item" data-command="buildTestC">
                  <strong>空操作占位</strong>
                  <span id="cmdBuild">--</span>
                </button>
              </div>
              <button class="btn primary wide" id="runAllBtn">直接运行 ./test_with</button>
            </section>

            <section class="panel terminal-panel">
              <div class="panel-head">
                <div>
                  <span class="eyebrow">SSH Terminal</span>
                  <h2>终端输出</h2>
                </div>
                <div class="button-row">
                  <button class="icon-btn" id="clearBtn" title="清屏">⌫</button>
                  <button class="icon-btn" id="copyBtn" title="复制输出">⧉</button>
                  <button class="btn ghost" id="markCompleteBtn">标记结果已采集</button>
                </div>
              </div>
              <pre class="terminal" id="terminalOutput">等待连接后端...</pre>
              <form class="terminal-input" id="terminalForm">
                <input id="terminalInput" autocomplete="off" placeholder="像 SSH 终端一样输入命令，例如 ./test_with" />
                <button class="btn primary" type="submit">发送</button>
              </form>
            </section>
          </div>
        </section>

        <section class="view" id="records">
          <section class="panel">
            <div class="panel-head">
              <div>
                <span class="eyebrow">Session</span>
                <h2>最近一次 test.c 输出</h2>
              </div>
              <button class="btn ghost" id="refreshResultBtn">刷新</button>
            </div>
            <div class="record-grid">
              <div class="record-field">
                <span>命令</span>
                <strong id="latestCommand">--</strong>
              </div>
              <div class="record-field">
                <span>状态</span>
                <strong id="latestStatus">--</strong>
              </div>
              <div class="record-field">
                <span>开始时间</span>
                <strong id="latestStartedAt">--</strong>
              </div>
            </div>
            <pre class="terminal record-terminal" id="latestOutput">暂无输出</pre>
          </section>
        </section>
      </main>
    </div>

    <div class="toast" id="toast"></div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
