<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VexRiscv FPGA Console</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">TLB</div>
          <div>
            <strong>VexRiscv</strong>
            <span>FPGA SSH Console</span>
          </div>
        </div>
        <nav>
          <button class="nav-item active" data-view="console">有防护模式</button>
          <button class="nav-item" data-view="records">运行记录</button>
          <button class="nav-item disabled" disabled>无防护模式</button>
        </nav>
        <div class="sidebar-status">
          <span>SSH</span>
          <strong id="sideStatus">未连接</strong>
        </div>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div>
            <span class="eyebrow">真实链路</span>
            <h1>FPGA SSH 与 test_with 运行控制台</h1>
          </div>
          <div class="status-row">
            <span class="pill" id="backendStatus">后端检查中</span>
            <span class="pill offline" id="sshStatus">SSH 未连接</span>
            <span class="pill idle" id="resultStatus">结果待采集</span>
          </div>
        </header>

        <section class="view active" id="console">
          <div class="grid">
            <section class="panel">
              <div class="panel-head">
                <div>
                  <span class="eyebrow">目标</span>
                  <h2>SSH 连接</h2>
                </div>
              </div>
              <label>
                FPGA Target
                <select id="targetSelect"></select>
              </label>
              <dl class="meta" id="targetMeta"></dl>
              <div class="buttons">
                <button class="btn primary" id="connectBtn">连接</button>
                <button class="btn ghost" id="disconnectBtn">断开</button>
              </div>
            </section>

            <section class="panel">
              <div class="panel-head">
                <div>
                  <span class="eyebrow">预设命令</span>
                  <h2>板上程序</h2>
                </div>
              </div>
              <div class="commands">
                <button class="command" data-command="runTestWith">
                  <strong>运行 test_with</strong>
                  <span id="cmdRun">--</span>
                </button>
                <button class="command" data-command="listHome">
                  <strong>列出目录</strong>
                  <span id="cmdList">--</span>
                </button>
                <button class="command" data-command="checkBinary">
                  <strong>查看 test_with</strong>
                  <span id="cmdCheck">--</span>
                </button>
              </div>
            </section>

            <section class="panel terminal-panel">
              <div class="panel-head">
                <div>
                  <span class="eyebrow">Terminal</span>
                  <h2>SSH 输出</h2>
                </div>
                <div class="buttons">
                  <button class="btn ghost" id="markCompleteBtn">标记结果已采集</button>
                  <button class="icon-btn" id="copyBtn" title="复制输出">⧉</button>
                  <button class="icon-btn" id="clearBtn" title="清屏">⌫</button>
                </div>
              </div>
              <pre class="terminal" id="terminalOutput">等待后端连接...</pre>
              <form class="terminal-input" id="terminalForm">
                <input id="terminalInput" autocomplete="off" placeholder="像 SSH 一样输入命令，例如 ./test_with" />
                <button class="btn primary" type="submit">发送</button>
              </form>
            </section>
          </div>
        </section>

        <section class="view" id="records">
          <section class="panel">
            <div class="panel-head">
              <div>
                <span class="eyebrow">最近结果</span>
                <h2>test_with 输出缓存</h2>
              </div>
              <button class="btn ghost" id="refreshResultBtn">刷新</button>
            </div>
            <div class="record-grid">
              <div><span>命令</span><strong id="latestCommand">--</strong></div>
              <div><span>状态</span><strong id="latestStatus">--</strong></div>
              <div><span>开始时间</span><strong id="latestStartedAt">--</strong></div>
            </div>
            <pre class="terminal record-terminal" id="latestOutput">暂无输出</pre>
          </section>
        </section>
      </main>
    </div>
    <div class="toast" id="toast"></div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
