<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VexRiscv TLB Partitioning 安全演示平台</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="主导航">
        <div class="brand">
          <div class="brand-mark">TLB</div>
          <div>
            <strong>VexRiscv Lab</strong>
            <span>Partitioning Demo</span>
          </div>
        </div>

        <nav class="nav-list">
          <button class="nav-item disabled" data-view="overview" disabled>
            <span class="nav-icon">⌂</span>
            <span>概览</span>
          </button>
          <button class="nav-item disabled" data-view="unprotected" disabled>
            <span class="nav-icon">!</span>
            <span>无防护模式</span>
          </button>
          <button class="nav-item active" data-view="protected">
            <span class="nav-icon">◆</span>
            <span>有防护模式</span>
          </button>
          <button class="nav-item disabled" data-view="compare" disabled>
            <span class="nav-icon">≡</span>
            <span>结果对比</span>
          </button>
          <button class="nav-item" data-view="records">
            <span class="nav-icon">▣</span>
            <span>实验记录</span>
          </button>
        </nav>

        <div class="sidebar-footer">
          <span class="mini-label">演示配置</span>
          <div class="config-line"><span>后端</span><strong id="backendMini">检查中</strong></div>
          <div class="config-line"><span>FPGA</span><strong id="sideStatus">未连接</strong></div>
        </div>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div>
            <span class="eyebrow" id="modeEyebrow">实验工作区</span>
            <h1 id="pageTitle">有防护模式</h1>
          </div>
          <div class="status-strip" aria-label="系统状态">
            <span class="status-pill idle" id="backendStatus"><i></i> 后端检查中</span>
            <span class="status-pill offline" id="sshStatus"><i></i> SSH 未连接</span>
            <span class="status-pill idle" id="resultStatus"><i></i> 结果待采集</span>
          </div>
        </header>

        <section class="view active" id="protected">
          <div class="protected-layout">
            <section class="panel ssh-panel">
              <div class="panel-head">
                <div>
                  <span class="eyebrow">SSH 目标</span>
                  <h2>FPGA 连接</h2>
                </div>
                <span class="badge muted" id="sshBadge">未连接</span>
              </div>
              <form class="ssh-form">
                <label>
                  Target
                  <select id="targetSelect"></select>
                </label>
                <label>
                  Host
                  <input id="targetHost" disabled value="--" />
                </label>
                <label>
                  Port
                  <input id="targetPort" disabled value="--" />
                </label>
                <label>
                  Username
                  <input id="targetUser" disabled value="--" />
                </label>
                <label>
                  Workdir
                  <input id="targetWorkdir" disabled value="--" />
                </label>
              </form>
              <div class="button-row full">
                <button class="btn primary" id="connectBtn">连接 FPGA</button>
                <button class="btn ghost" id="disconnectBtn">断开</button>
              </div>
            </section>

            <section class="panel terminal-panel">
              <div class="panel-head">
                <div>
                  <span class="eyebrow">WebSocket SSH</span>
                  <h2>内嵌终端</h2>
                </div>
                <div class="button-row">
                  <button class="btn ghost" id="markCompleteBtn">标记结果已采集</button>
                  <button class="icon-btn" id="copyBtn" title="复制输出">⧉</button>
                  <button class="icon-btn" id="clearBtn" title="清屏">⌫</button>
                </div>
              </div>
              <pre class="terminal" id="terminalOutput">fpga@bridge:~$ 等待连接...</pre>
              <form class="terminal-input" id="terminalForm">
                <input id="terminalInput" autocomplete="off" placeholder="像 SSH 一样输入命令，例如 ./test_with" />
                <button class="btn primary" type="submit">发送</button>
              </form>
            </section>

            <section class="panel command-panel">
              <div class="panel-head">
                <div>
                  <span class="eyebrow">预设命令</span>
                  <h2>FPGA 实验控制</h2>
                </div>
              </div>
              <div class="command-list">
                <button class="command-item" data-command="runTestWith">
                  <strong>运行 test_with</strong>
                  <span id="cmdRun">--</span>
                </button>
                <button class="command-item" data-command="runTestNo">
                  <strong>运行 test_no</strong>
                  <span id="cmdRunNo">--</span>
                </button>
                <button class="command-item" data-command="listHome">
                  <strong>列出目录</strong>
                  <span id="cmdList">--</span>
                </button>
                <button class="command-item" data-command="checkBinary">
                  <strong>查看可执行程序</strong>
                  <span id="cmdCheck">--</span>
                </button>
              </div>
            </section>
          </div>
        </section>

        <section class="view" id="records">
          <section class="panel">
            <div class="panel-head">
              <div>
                <span class="eyebrow">实验留痕</span>
                <h2>本次演示记录</h2>
              </div>
              <button class="btn ghost" id="refreshResultBtn">刷新</button>
            </div>
            <div class="record-layout">
              <article class="result-card">
                <div class="result-head">
                  <div>
                    <span class="eyebrow">test_with</span>
                    <h3>有防护输出</h3>
                  </div>
                  <span class="badge idle" id="testWithStatus">待采集</span>
                </div>
                <div class="artifact-list compact">
                  <article><span>命令</span><strong id="testWithCommand">--</strong></article>
                  <article><span>开始时间</span><strong id="testWithStartedAt">--</strong></article>
                  <article><span>结束时间</span><strong id="testWithEndedAt">--</strong></article>
                </div>
                <pre class="record-log" id="testWithOutput">暂无输出</pre>
              </article>

              <article class="result-card">
                <div class="result-head">
                  <div>
                    <span class="eyebrow">test_no</span>
                    <h3>无防护输出</h3>
                  </div>
                  <span class="badge idle" id="testNoStatus">待采集</span>
                </div>
                <div class="artifact-list compact">
                  <article><span>命令</span><strong id="testNoCommand">--</strong></article>
                  <article><span>开始时间</span><strong id="testNoStartedAt">--</strong></article>
                  <article><span>结束时间</span><strong id="testNoEndedAt">--</strong></article>
                </div>
                <pre class="record-log" id="testNoOutput">暂无输出</pre>
              </article>
            </div>
          </section>
        </section>
      </main>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
